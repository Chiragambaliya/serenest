<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon-512.png">
  <link rel="apple-touch-icon" href="/favicon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1E6FAB">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Serenest">
<title>Reset password — Serenest</title>
  <meta name="description" content="Reset your Serenest account password securely.">
  <link rel="canonical" href="https://serenest.in/reset-password.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Serenest">
  <meta property="og:image" content="https://serenest.in/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@serenest_in">
  <meta name="twitter:image" content="https://serenest.in/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="premium.css">
<script src="config.js"></script>
<style>
:root{--sage:#1E6FAB;--sage-light:#5296C9;--sage-dark:#0F4C7F;--teal:#0891B2;--cream:#F5F8FF;--cream-dark:#E2EBF5;--dark:#0A1628;--dark-mid:#0F2040;--text:#1A2B45;--text-light:#4A637F;--text-muted:#7A92AA;--white:#FFFFFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--dark);min-height:100vh;display:flex;flex-direction:column;}
nav{padding:20px 56px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,22,40,0.92);border-bottom:1px solid rgba(30,111,171,0.18);position:fixed;top:0;left:0;right:0;z-index:100;-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);}
.logo{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;color:var(--white);text-decoration:none;letter-spacing:-0.02em;}
.logo span{color:var(--sage-light);}
nav .nav-right a{text-decoration:none;font-size:0.85rem;color:rgba(255,255,255,0.55);transition:color 0.2s;font-weight:500;}
nav .nav-right a:hover{color:var(--white);}
nav .nav-right a+a{margin-left:20px;}
.auth-page{flex:1;display:flex;align-items:center;justify-content:center;padding:100px 24px 60px;background:radial-gradient(circle at 60% 40%,rgba(30,111,171,0.1) 0%,transparent 55%),var(--dark);}
.auth-card{background:rgba(255,255,255,0.04);border:1px solid rgba(30,111,171,0.2);border-radius:24px;padding:48px;max-width:420px;width:100%;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);}
.auth-card h1{font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:700;color:var(--white);margin-bottom:8px;letter-spacing:-0.02em;}
.auth-card .sub{margin-bottom:28px;font-size:0.9rem;color:rgba(255,255,255,0.4);}
.auth-card label{display:block;font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.4);margin-bottom:8px;}
.auth-card input{width:100%;padding:14px 16px;border:1px solid rgba(30,111,171,0.25);border-radius:12px;font-family:inherit;font-size:0.95rem;box-sizing:border-box;margin-bottom:20px;background:rgba(255,255,255,0.06);color:var(--white);transition:border-color 0.2s;}
.auth-card input::placeholder{color:rgba(255,255,255,0.2);}
.auth-card input:focus{outline:none;border-color:rgba(30,111,171,0.6);}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--sage),var(--teal));color:var(--white);border:none;border-radius:12px;font-family:inherit;font-size:0.95rem;font-weight:600;cursor:pointer;transition:opacity 0.2s,transform 0.15s;}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px);}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.auth-error{font-size:0.85rem;color:#f08080;margin-top:12px;display:none;background:rgba(192,57,43,0.12);padding:10px 14px;border-radius:10px;}
.auth-success{font-size:0.85rem;color:#7BB8E0;margin-top:12px;display:none;background:rgba(30,111,171,0.15);padding:12px 14px;border-radius:10px;line-height:1.5;}
.auth-success a{color:var(--sage-light);font-weight:600;}
.link-row{font-size:0.88rem;color:rgba(255,255,255,0.3);margin-top:16px;}
.link-row a{color:var(--sage-light);text-decoration:none;font-weight:600;}
.link-row a:hover{text-decoration:underline;}
.invalid-state{text-align:center;padding:16px 0;}
.invalid-state .icon{font-size:2.5rem;margin-bottom:16px;}
.invalid-state h1{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;color:var(--white);margin-bottom:12px;}
.invalid-state p{font-size:0.9rem;color:rgba(255,255,255,0.4);margin-bottom:24px;line-height:1.7;}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Sere<span>nest</span></a>
  <div class="nav-right">
    <a href="login.html">Log in</a>
    <a href="signup.html">Sign up</a>
  </div>
</nav>
<div class="auth-page">
  <div class="auth-card">
    <div id="invalidState" class="invalid-state" style="display:none;">
      <div class="icon">🔗</div>
      <h1>Link expired</h1>
      <p>This password reset link is invalid or has already been used. Please request a new one.</p>
      <a href="login.html" style="display:inline-block;padding:13px 32px;background:linear-gradient(135deg,var(--sage),var(--teal));color:var(--white);border-radius:12px;text-decoration:none;font-weight:600;font-size:0.92rem;">Back to log in</a>
    </div>
    <div id="resetForm">
      <h1>Reset password</h1>
      <p class="sub">Choose a strong new password for your Serenest account.</p>
      <label>New password (min 8 characters)</label>
      <input type="password" id="newPassword" placeholder="New password" autocomplete="new-password" minlength="8">
      <label>Confirm new password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm password" autocomplete="new-password" minlength="8">
      <button type="button" class="btn-primary" id="resetBtn">Set new password</button>
      <p id="resetError" class="auth-error"></p>
      <p id="resetSuccess" class="auth-success"></p>
      <p class="link-row"><a href="login.html">← Back to log in</a></p>
    </div>
  </div>
</div>
<script>
(function(){
  var API=(window.API_BASE||'')+'/api';
  var token='';
  var params=new URLSearchParams(window.location.search);
  token=params.get('token')||'';
  if(!token){document.getElementById('resetForm').style.display='none';document.getElementById('invalidState').style.display='block';}
  document.getElementById('resetBtn').addEventListener('click',function(){
    var newPw=document.getElementById('newPassword').value;
    var confirmPw=document.getElementById('confirmPassword').value;
    var errEl=document.getElementById('resetError');
    var sucEl=document.getElementById('resetSuccess');
    errEl.style.display='none';sucEl.style.display='none';
    if(!newPw||newPw.length<8){errEl.textContent='Password must be at least 8 characters.';errEl.style.display='block';return;}
    if(newPw!==confirmPw){errEl.textContent='Passwords do not match.';errEl.style.display='block';return;}
    var btn=document.getElementById('resetBtn');
    btn.disabled=true;btn.textContent='Updating…';
    fetch(API+'/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:token,new_password:newPw})})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d&&d.ok){sucEl.innerHTML='Password updated. <a href="login.html">Log in now →</a>';sucEl.style.display='block';document.getElementById('newPassword').value='';document.getElementById('confirmPassword').value='';btn.style.display='none';}
        else{errEl.textContent=d&&d.error?d.error:'Failed to reset password.';errEl.style.display='block';if(d&&d.error&&(d.error.indexOf('invalid')!==-1||d.error.indexOf('expired')!==-1)){setTimeout(function(){document.getElementById('resetForm').style.display='none';document.getElementById('invalidState').style.display='block';},2000);}btn.disabled=false;btn.textContent='Set new password';}
      })
      .catch(function(){errEl.textContent='Network error. Try again.';errEl.style.display='block';btn.disabled=false;btn.textContent='Set new password';});
  });
  [document.getElementById('newPassword'),document.getElementById('confirmPassword')].forEach(function(el){el.addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('resetBtn').click();});});
})();
</script>
<script src="premium.js"></script>
<script src="scripts/dark-mode.js"></script>
<script src="scripts/whatsapp-float.js"></script>
</body>
</html>
