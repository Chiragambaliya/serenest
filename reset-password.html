<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon-512.png">
  <link rel="apple-touch-icon" href="/favicon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1E6FAB">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Serenest">
<title>Reset password — Serenest</title>
  <meta name="description" content="Reset your Serenest account password securely.">
  <link rel="canonical" href="https://serenest.in/reset-password.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Serenest">
  <meta property="og:image" content="https://serenest.in/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@serenest_in">
  <meta name="twitter:image" content="https://serenest.in/og-image.png">

<link rel="stylesheet" href="premium.css">
<script src="config.js"></script>
<style>
.patient-auth{min-height:100vh;padding:120px 24px 80px;display:flex;align-items:center;justify-content:center;}
.auth-card{background:var(--white);border-radius:24px;padding:48px;max-width:400px;width:100%;border:1.5px solid var(--cream-dark);box-shadow:0 20px 60px rgba(28,36,32,0.08);}
.auth-card h1{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:300;color:var(--dark);margin-bottom:8px;}
.auth-card .sub{margin-bottom:28px;font-size:0.9rem;color:var(--text-light);}
.auth-card label{display:block;font-size:0.75rem;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-light);margin-bottom:8px;}
.auth-card input{width:100%;padding:14px 16px;border:1.5px solid var(--cream-dark);border-radius:12px;font-family:inherit;font-size:0.95rem;box-sizing:border-box;margin-bottom:20px;}
.auth-card input:focus{outline:none;border-color:var(--sage);}
.auth-card button.btn-primary{width:100%;padding:14px;background:var(--sage);color:var(--white);border:none;border-radius:12px;font-family:inherit;font-size:0.95rem;font-weight:500;cursor:pointer;}
.auth-card button.btn-primary:hover{background:var(--sage-dark);}
.auth-card button.btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
.auth-error{font-size:0.85rem;color:#c0392b;margin-top:12px;display:none;}
.auth-success{font-size:0.85rem;color:var(--sage-dark);margin-top:12px;display:none;background:rgba(30,111,171,0.1);padding:12px 14px;border-radius:10px;line-height:1.5;}
.auth-card .link-row{font-size:0.88rem;color:var(--text-light);margin-top:16px;}
.auth-card .link-row a{color:var(--sage-dark);text-decoration:none;}
.invalid-state{text-align:center;padding:24px 0;}
.invalid-state .icon{font-size:2.5rem;margin-bottom:16px;}
.invalid-state p{font-size:0.9rem;color:var(--text-light);margin-bottom:20px;}
nav{padding:20px 60px;display:flex;align-items:center;justify-content:space-between;background:rgba(247,245,240,0.88);border-bottom:1px solid rgba(30,111,171,0.15);}
.logo{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:600;color:var(--dark);text-decoration:none;}.logo span{color:var(--sage);}
</style>
</head>
<body>
<nav><a href="index.html" class="logo">Sere<span>nest</span></a><div><a href="login.html" style="font-size:0.9rem;color:var(--text-light);text-decoration:none;">Log in</a> &nbsp; <a href="signup.html" style="font-size:0.9rem;color:var(--text-light);text-decoration:none;">Sign up</a></div></nav>
<div class="patient-auth">
  <div class="auth-card">
    <!-- Invalid / missing token state -->
    <div id="invalidState" class="invalid-state" style="display:none;">
      <div class="icon">🔗</div>
      <h1 style="font-size:1.4rem;">Link expired</h1>
      <p>This password reset link is invalid or has already been used. Please request a new one.</p>
      <a href="login.html" class="btn-primary" style="display:inline-block;padding:13px 32px;background:var(--sage);color:var(--white);border-radius:12px;text-decoration:none;font-weight:500;font-size:0.92rem;">Back to log in</a>
    </div>

    <!-- Reset form -->
    <div id="resetForm">
      <h1>Reset password</h1>
      <p class="sub">Choose a strong new password for your Serenest account.</p>
      <label>New password (min 8 characters)</label>
      <input type="password" id="newPassword" placeholder="New password" autocomplete="new-password" minlength="8">
      <label>Confirm new password</label>
      <input type="password" id="confirmPassword" placeholder="Confirm password" autocomplete="new-password" minlength="8">
      <button type="button" class="btn-primary" id="resetBtn">Set new password</button>
      <p id="resetError" class="auth-error"></p>
      <p id="resetSuccess" class="auth-success"></p>
      <p class="link-row"><a href="login.html">← Back to log in</a></p>
    </div>
  </div>
</div>

<script>
(function(){
  var API = (window.API_BASE || '') + '/api';
  var token = '';

  // Extract token from URL
  var params = new URLSearchParams(window.location.search);
  token = params.get('token') || '';

  if (!token) {
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('invalidState').style.display = 'block';
  }

  document.getElementById('resetBtn').addEventListener('click', function() {
    var newPw = document.getElementById('newPassword').value;
    var confirmPw = document.getElementById('confirmPassword').value;
    var errEl = document.getElementById('resetError');
    var sucEl = document.getElementById('resetSuccess');
    errEl.style.display = 'none'; sucEl.style.display = 'none';

    if (!newPw || newPw.length < 8) {
      errEl.textContent = 'Password must be at least 8 characters.';
      errEl.style.display = 'block'; return;
    }
    if (newPw !== confirmPw) {
      errEl.textContent = 'Passwords do not match.';
      errEl.style.display = 'block'; return;
    }

    var btn = document.getElementById('resetBtn');
    btn.disabled = true; btn.textContent = 'Updating…';

    fetch(API + '/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: token, new_password: newPw })
    })
    .then(function(r){ return r.json(); })
    .then(function(d) {
      if (d && d.ok) {
        sucEl.innerHTML = 'Password updated. <a href="login.html" style="color:var(--sage-dark);font-weight:600;">Log in now →</a>';
        sucEl.style.display = 'block';
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
        btn.style.display = 'none';
      } else {
        errEl.textContent = d && d.error ? d.error : 'Failed to reset password.';
        errEl.style.display = 'block';
        if (d && d.error && (d.error.indexOf('invalid') !== -1 || d.error.indexOf('expired') !== -1)) {
          setTimeout(function() {
            document.getElementById('resetForm').style.display = 'none';
            document.getElementById('invalidState').style.display = 'block';
          }, 2000);
        }
        btn.disabled = false; btn.textContent = 'Set new password';
      }
    })
    .catch(function() {
      errEl.textContent = 'Network error. Try again.';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Set new password';
    });
  });

  // Allow Enter key
  [document.getElementById('newPassword'), document.getElementById('confirmPassword')].forEach(function(el) {
    el.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('resetBtn').click();
    });
  });
})();
</script>
<script src="premium.js"></script>
<script src="scripts/dark-mode.js"></script>
<script src="scripts/whatsapp-float.js"></script>
</body>
</html>
