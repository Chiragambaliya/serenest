<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon-512.png">
  <link rel="apple-touch-icon" href="/favicon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1E6FAB">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Serenest">
<title>My profile — Serenest</title>
  <meta name="description" content="Update your personal information and preferences on your Serenest account.">
  <link rel="canonical" href="https://serenest.in/profile.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Serenest">
  <meta property="og:image" content="https://serenest.in/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@serenest_in">
  <meta name="twitter:image" content="https://serenest.in/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="premium.css">
<script src="config.js"></script>
<style>
:root{--sage:#1E6FAB;--sage-light:#5296C9;--sage-dark:#0F4C7F;--teal:#0891B2;--cream:#F5F8FF;--cream-dark:#E2EBF5;--dark:#0A1628;--dark-mid:#0F2040;--text:#1A2B45;--text-light:#4A637F;--text-muted:#7A92AA;--white:#FFFFFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--dark);min-height:100vh;}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 56px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,22,40,0.92);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-bottom:1px solid rgba(30,111,171,0.18);}
.logo{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;color:var(--white);text-decoration:none;letter-spacing:-0.02em;}
.logo span{color:var(--sage-light);}
.nav-links{display:flex;align-items:center;gap:24px;}
.nav-links a{text-decoration:none;font-size:0.85rem;color:rgba(255,255,255,0.55);transition:color 0.2s;font-weight:500;}
.nav-links a:hover{color:var(--white);}
/* HERO */
.profile-hero{padding:120px 56px 40px;background:linear-gradient(135deg,var(--dark) 0%,var(--dark-mid) 100%);border-bottom:1px solid rgba(30,111,171,0.12);}
.profile-hero-inner{max-width:640px;margin:0 auto;}
.section-tag{display:inline-block;font-size:0.7rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--sage-light);border:1px solid rgba(82,150,201,0.3);padding:5px 14px;border-radius:40px;margin-bottom:14px;background:rgba(30,111,171,0.1);}
.profile-hero h1{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:700;color:var(--white);margin-bottom:8px;letter-spacing:-0.02em;}
.profile-hero p{font-size:0.9rem;color:rgba(255,255,255,0.4);}
/* CONTENT */
.profile-content{max-width:640px;margin:0 auto;padding:40px 56px 80px;}
.profile-section{background:rgba(255,255,255,0.04);border:1px solid rgba(30,111,171,0.18);border-radius:20px;padding:32px;margin-bottom:24px;}
.profile-section h2{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--white);margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.06);}
.profile-section label{display:block;font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.4);margin-bottom:8px;}
.profile-section input{width:100%;padding:13px 16px;border:1px solid rgba(30,111,171,0.25);border-radius:12px;font-family:inherit;font-size:0.93rem;margin-bottom:18px;background:rgba(255,255,255,0.06);color:var(--white);transition:border-color 0.2s;}
.profile-section input::placeholder{color:rgba(255,255,255,0.2);}
.profile-section input:focus{outline:none;border-color:rgba(30,111,171,0.6);}
.profile-section input:disabled{background:rgba(255,255,255,0.03);color:rgba(255,255,255,0.25);cursor:not-allowed;}
.btn{display:inline-block;padding:12px 28px;background:linear-gradient(135deg,var(--sage),var(--teal));color:var(--white);border:none;border-radius:12px;font-family:inherit;font-size:0.9rem;font-weight:600;cursor:pointer;transition:opacity 0.2s,transform 0.15s;}
.btn:hover{opacity:0.9;transform:translateY(-1px);}
.btn-secondary{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.1);}
.btn-secondary:hover{background:rgba(255,255,255,0.1);color:var(--white);}
.profile-msg{font-size:0.85rem;margin-top:12px;display:none;padding:10px 14px;border-radius:10px;}
.profile-msg.ok{color:#7BB8E0;background:rgba(30,111,171,0.15);}
.profile-msg.err{color:#f08080;background:rgba(192,57,43,0.12);}
@media(max-width:768px){nav{padding:16px 24px;}.profile-hero{padding:90px 24px 32px;}.profile-content{padding:28px 24px 60px;}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Sere<span>nest</span></a>
  <div class="nav-links">
    <a href="book.html">Book</a>
    <a href="dashboard.html">My bookings</a>
    <a href="profile.html">Profile</a>
    <a href="#" id="logoutLink">Log out</a>
  </div>
</nav>
<div class="profile-hero">
  <div class="profile-hero-inner">
    <span class="section-tag">Patient Portal</span>
    <h1>My Profile</h1>
    <p>Manage your account details and security settings.</p>
  </div>
</div>
<div class="profile-content">
  <div class="profile-section">
    <h2>Account details</h2>
    <label>Email</label>
    <input type="email" id="profileEmail" disabled placeholder="Loading…">
    <label>Full name</label>
    <input type="text" id="profileName" placeholder="Your name">
    <button type="button" id="saveProfileBtn" class="btn">Save name</button>
    <p id="profileMsg" class="profile-msg"></p>
  </div>
  <div class="profile-section">
    <h2>Change password</h2>
    <label>Current password</label>
    <input type="password" id="currentPassword" placeholder="Enter current password">
    <label>New password (min 8 characters)</label>
    <input type="password" id="newPassword" placeholder="New password">
    <label>Confirm new password</label>
    <input type="password" id="confirmPassword" placeholder="Confirm new password">
    <button type="button" id="changePwBtn" class="btn btn-secondary">Change password</button>
    <p id="passwordMsg" class="profile-msg"></p>
  </div>
</div>
<script>
(function(){
  var TOKEN_KEY='serenest_patient_token';
  var API=(window.API_BASE||'')+'/api';
  var token=localStorage.getItem(TOKEN_KEY);
  if(!token){window.location.href='login.html';return;}
  var headers={'X-Patient-Token':token,'Content-Type':'application/json'};
  document.getElementById('logoutLink').addEventListener('click',function(e){e.preventDefault();localStorage.removeItem(TOKEN_KEY);window.location.href='index.html';});
  function showMsg(el,text,isErr){var m=document.getElementById(el);m.textContent=text;m.className='profile-msg '+(isErr?'err':'ok');m.style.display='block';}
  function hideMsg(el){document.getElementById(el).style.display='none';}
  fetch(API+'/me',{headers:headers}).then(function(r){if(r.status===401){localStorage.removeItem(TOKEN_KEY);window.location.href='login.html';return null;}return r.json();}).then(function(d){if(!d||!d.ok)return;document.getElementById('profileEmail').value=d.patient.email||'';document.getElementById('profileName').value=d.patient.full_name||'';}).catch(function(){showMsg('profileMsg','Could not load profile.',true);});
  document.getElementById('saveProfileBtn').addEventListener('click',function(){hideMsg('profileMsg');var name=document.getElementById('profileName').value.trim();fetch(API+'/me',{method:'PUT',headers:headers,body:JSON.stringify({full_name:name})}).then(function(r){return r.json();}).then(function(d){if(d&&d.ok){showMsg('profileMsg','Saved.');}else{showMsg('profileMsg',d&&d.error?d.error:'Failed.',true);}}).catch(function(){showMsg('profileMsg','Network error.',true);});});
  document.getElementById('changePwBtn').addEventListener('click',function(){hideMsg('passwordMsg');var cur=document.getElementById('currentPassword').value;var newP=document.getElementById('newPassword').value;var conf=document.getElementById('confirmPassword').value;if(!cur){showMsg('passwordMsg','Enter current password.',true);return;}if(newP.length<8){showMsg('passwordMsg','New password must be at least 8 characters.',true);return;}if(newP!==conf){showMsg('passwordMsg','New passwords do not match.',true);return;}fetch(API+'/me/change-password',{method:'POST',headers:headers,body:JSON.stringify({current_password:cur,new_password:newP})}).then(function(r){return r.json();}).then(function(d){if(d&&d.ok){showMsg('passwordMsg','Password updated.');document.getElementById('currentPassword').value='';document.getElementById('newPassword').value='';document.getElementById('confirmPassword').value='';}else{showMsg('passwordMsg',d&&d.error?d.error:'Failed.',true);}}).catch(function(){showMsg('passwordMsg','Network error.',true);});});
})();
</script>
<script src="premium.js"></script>
<script src="scripts/dark-mode.js"></script>
<script src="scripts/whatsapp-float.js"></script>
</body>
</html>
