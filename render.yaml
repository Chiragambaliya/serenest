services:
  - type: web
    name: serenest-website
    runtime: node
    region: singapore   # closest to India
    plan: free

    buildCommand: npm install && npm run build
    startCommand: node server.js

    envVars:
      - key: NODE_ENV
        value: production

      # Canonical + Open Graph base URL (match your public domain).
      - key: VITE_SITE_URL
        value: https://serenest.fit

      # ── Supabase ─────────────────────────────────────────────
      - key: VITE_SUPABASE_URL
        sync: false   # you'll paste this in Render dashboard
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

      # ── Security ─────────────────────────────────────────────
      - key: ADMIN_SECRET
        sync: false

      # ── Daily.co (optional) ──────────────────────────────────
      - key: DAILY_API_KEY
        sync: false

      # ── Email notifications via Resend (optional) ────────────
      # Get an API key at https://resend.com (free 3000/mo).
      - key: RESEND_API_KEY
        sync: false
      - key: NOTIFY_FROM
        value: Serenest Alerts <onboarding@resend.dev>
      - key: NOTIFY_EMAIL
        sync: false

      # ── CORS (set to your Render URL after first deploy) ─────
      # - key: CORS_ORIGIN
      #   value: https://serenest-website.onrender.com
