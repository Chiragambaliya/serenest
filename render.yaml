services:
  - type: web
    name: serenest-website
    runtime: node
    region: singapore   # closest to India
    plan: free

    buildCommand: npm install && npm run build
    startCommand: node server.js

    envVars:
      - key: NODE_ENV
        value: production

      # ── Supabase ─────────────────────────────────────────────
      - key: VITE_SUPABASE_URL
        sync: false   # you'll paste this in Render dashboard
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

      # ── Security ─────────────────────────────────────────────
      - key: ADMIN_SECRET
        sync: false

      # ── Daily.co (optional) ──────────────────────────────────
      - key: DAILY_API_KEY
        sync: false

      # ── OpenAI: Serenest Guide chat (optional) ──────────────
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini

      # ── Email notifications via Resend (optional) ────────────
      # Get an API key at https://resend.com (free 3000/mo).
      - key: RESEND_API_KEY
        sync: false
      - key: NOTIFY_FROM
        value: Serenest Alerts <onboarding@resend.dev>
      - key: NOTIFY_EMAIL
        sync: false

      # ── Team WhatsApp pings via CallMeBot (optional, free) ───
      # https://www.callmebot.com/blog/free-api-whatsapp-messages/
      - key: CALLMEBOT_WHATSAPP_APIKEY
        sync: false
      - key: CALLMEBOT_WHATSAPP_PHONE
        sync: false

      # ── Razorpay payments (optional — bookings stay free-flow until set) ──
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      # - key: DEFAULT_FEE_INR
      #   value: "499"

      # ── Anthropic: Academy & social content generation (optional) ──
      - key: ANTHROPIC_API_KEY
        sync: false

      # ── Telegram team alerts (optional) ──────────────────────
      # - key: TELEGRAM_BOT_TOKEN
      #   sync: false
      # - key: TELEGRAM_CHAT_ID
      #   sync: false

      # ── Social auto-posting (optional; Admin → Social Media) ─
      # - key: INSTAGRAM_ACCESS_TOKEN
      #   sync: false
      # - key: INSTAGRAM_USER_ID
      #   sync: false
      # - key: LINKEDIN_ACCESS_TOKEN
      #   sync: false
      # - key: LINKEDIN_ORG_URN
      #   sync: false

      # ── WhatsApp channel link for approved professionals (optional) ──
      # - key: VITE_WA_CHANNEL_LINK
      #   sync: false

      # ── Visitor alerts: email each unique visitor (optional; WhatsApp pings always when CallMeBot set)
      # - key: NOTIFY_EACH_UNIQUE_VISITOR_EMAIL
      #   value: "true"

      # ── CORS allow-list (optional — production already defaults to
      #    https://www.serenest.in + https://serenest.in, never `*`) ──
      # - key: CORS_ORIGIN
      #   value: https://www.serenest.in,https://serenest.in

  # NOTE: Serenest Academy used to be a second static service (rootDir:
  # education-site). It's now merged into the main app at /academy and served
  # from this single Node web service — one deploy, one domain (serenest.in).
