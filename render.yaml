services:
  - type: web
    name: serenest-website
    runtime: node
    region: singapore   # closest to India
    plan: free

    buildCommand: npm install && npm run build
    startCommand: node server.js

    envVars:
      - key: NODE_ENV
        value: production

      # ── Supabase ─────────────────────────────────────────────
      - key: VITE_SUPABASE_URL
        sync: false   # you'll paste this in Render dashboard
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

      # ── Security ─────────────────────────────────────────────
      - key: ADMIN_SECRET
        sync: false

      # ── Daily.co (optional) ──────────────────────────────────
      - key: DAILY_API_KEY
        sync: false

      # ── OpenAI: Serenest Guide chat (optional) ──────────────
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini

      # ── Email notifications via Resend (optional) ────────────
      # Get an API key at https://resend.com (free 3000/mo).
      - key: RESEND_API_KEY
        sync: false
      - key: NOTIFY_FROM
        value: Serenest Alerts <onboarding@resend.dev>
      - key: NOTIFY_EMAIL
        sync: false

      # ── Team WhatsApp pings via CallMeBot (optional, free) ───
      # https://www.callmebot.com/blog/free-api-whatsapp-messages/
      - key: CALLMEBOT_WHATSAPP_APIKEY
        sync: false
      - key: CALLMEBOT_WHATSAPP_PHONE
        sync: false

      # ── Visitor alerts: email each unique visitor (optional; WhatsApp pings always when CallMeBot set)
      # - key: NOTIFY_EACH_UNIQUE_VISITOR_EMAIL
      #   value: "true"

      # ── Payments via Razorpay (optional) ─────────────────────
      # Both keys set → bookings are paid + confirmed instantly.
      # Unset → manual "we'll call you back" booking flow.
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

      # ── Google Analytics 4 (optional) ────────────────────────
      # Measurement ID (G-XXXXXXXXXX) — enables analytics + conversion events.
      - key: GA_MEASUREMENT_ID
        sync: false

      # ── CORS (set to your custom domain after first deploy) ──
      # - key: CORS_ORIGIN
      #   value: https://serenest.in

  # NOTE: Serenest Academy used to be a second static service (rootDir:
  # education-site). It's now merged into the main app at /academy and served
  # from this single Node web service — one deploy, one domain (serenest.in).
