# Triggers a Render deploy using a Deploy Hook URL.
# Setup: Render → your Web Service → Settings → Deploy Hook → copy URL.
# GitHub → repo Settings → Secrets and variables → Actions → New repository secret:
#   Name:  RENDER_DEPLOY_HOOK
#   Value: (paste full hook URL from Render)
#
# Then push to main or run this workflow manually (Actions → Trigger Render deploy → Run workflow).

name: Trigger Render deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: render-deploy
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: POST Render deploy hook
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::error::Add repository secret RENDER_DEPLOY_HOOK with your Render deploy hook URL."
            exit 1
          fi
          curl -fsS -X POST "$HOOK"
