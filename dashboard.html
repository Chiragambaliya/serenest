<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My bookings — Serenest</title>
<link rel="stylesheet" href="premium.css">
<script src="config.js"></script>
<style>
.dash-page{min-height:100vh;padding:100px 60px 80px;max-width:900px;margin:0 auto;}
.dash-page h1{font-family:'Syne',sans-serif;font-size:2rem;font-weight:300;color:var(--dark);margin-bottom:8px;}
.dash-page .sub{font-size:0.9rem;color:var(--text-light);margin-bottom:32px;}
.dash-page a{color:var(--sage-dark);}
.booking-list{display:flex;flex-direction:column;gap:16px;}
.booking-card{background:var(--white);border:1.5px solid var(--cream-dark);border-radius:16px;padding:24px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.booking-card-left h3{font-size:1rem;color:var(--dark);margin-bottom:6px;}
.booking-card-left p{margin:4px 0;font-size:0.88rem;color:var(--text-light);}
.booking-status{display:inline-block;padding:3px 10px;border-radius:40px;font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;}
.status-confirmed{background:rgba(30,111,171,0.15);color:var(--sage-dark);}
.status-pending{background:rgba(240,180,60,0.15);color:#b07f10;}
.status-cancelled{background:rgba(192,57,43,0.1);color:#c0392b;}
.status-rescheduled{background:rgba(52,152,219,0.12);color:#2471a3;}
.booking-card-right{display:flex;flex-direction:column;gap:8px;flex-shrink:0;align-items:flex-end;}
.booking-card-right .video-link a{display:inline-block;padding:10px 20px;background:var(--sage);color:white!important;border-radius:40px;font-size:0.85rem;text-decoration:none;}
.booking-card-right .video-link a:hover{background:var(--sage-dark);}
.cancel-btn{font-size:0.8rem;background:none;border:1.5px solid var(--cream-dark);border-radius:40px;padding:7px 14px;color:var(--text-muted);cursor:pointer;font-family:inherit;transition:border-color .2s,color .2s;}
.cancel-btn:hover{border-color:#c0392b;color:#c0392b;}
.empty-bookings{background:var(--white);border:1.5px solid var(--cream-dark);border-radius:16px;padding:48px;text-align:center;color:var(--text-light);}
nav{padding:20px 60px;display:flex;align-items:center;justify-content:space-between;background:rgba(247,245,240,0.88);border-bottom:1px solid rgba(30,111,171,0.15);}
.logo{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:600;color:var(--dark);text-decoration:none;}.logo span{color:var(--sage);}
nav a{text-decoration:none;font-size:0.9rem;color:var(--text-light);}
@media(max-width:900px){.dash-page{padding:80px 24px 60px;}.booking-card{flex-direction:column;}.booking-card-right{align-items:flex-start;}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Sere<span>nest</span></a>
  <div><a href="book.html">Book</a> &nbsp; <a href="account.html">My account</a> &nbsp; <a href="profile.html">Profile</a> &nbsp; <a href="#" id="logoutLink">Log out</a></div>
</nav>
<div class="dash-page">
  <h1>My bookings</h1>
  <p class="sub">Your upcoming and past sessions. Click "Join video call" when your specialist has shared a link.</p>
  <div id="bookingList" class="booking-list"></div>
  <div id="emptyBookings" class="empty-bookings" style="display:none;">
    <p>You don't have any bookings yet.</p>
    <p style="margin-top:12px;"><a href="book.html">Book a consultation</a></p>
  </div>
  <p id="dashboardError" style="display:none;color:#c0392b;margin-top:16px;"></p>
</div>
<script>
(function(){
  var TOKEN_KEY='serenest_patient_token';
  var API=(window.API_BASE||'')+'/api';

  // Handle Google OAuth token fragment
  var hash=window.location.hash;
  if(hash&&hash.indexOf('token=')!==-1){
    var t=hash.replace('#token=','').replace('#','');
    if(t){ localStorage.setItem(TOKEN_KEY,t); window.history.replaceState(null,'',window.location.pathname); }
  }

  var token=localStorage.getItem(TOKEN_KEY);
  if(!token){ window.location.href='login.html'; return; }
  var headers={'X-Patient-Token':token,'Content-Type':'application/json'};

  document.getElementById('logoutLink').addEventListener('click',function(e){
    e.preventDefault();
    fetch(API+'/logout',{method:'POST',headers:headers}).catch(function(){});
    localStorage.removeItem(TOKEN_KEY);
    window.location.href='index.html';
  });

  function escapeHtml(s){ if(s==null) return ''; var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
  function statusBadge(status){
    var map={confirmed:'status-confirmed',pending:'status-pending',cancelled:'status-cancelled',rescheduled:'status-rescheduled'};
    var label=(status||'pending').charAt(0).toUpperCase()+(status||'pending').slice(1);
    return '<span class="booking-status '+(map[status]||'status-pending')+'">'+label+'</span>';
  }

  fetch(API+'/me/bookings',{headers:headers})
    .then(function(r){
      if(r.status===401){ localStorage.removeItem(TOKEN_KEY); window.location.href='login.html'; return null; }
      return r.json();
    })
    .then(function(d){
      if(!d) return;
      if(!d.ok){ document.getElementById('dashboardError').textContent=d.error||'Failed to load'; document.getElementById('dashboardError').style.display='block'; return; }
      var list=document.getElementById('bookingList');
      var empty=document.getElementById('emptyBookings');
      var rows=d.data||[];
      if(rows.length===0){ empty.style.display='block'; return; }
      rows.forEach(function(b){
        var status=b.status||'pending';
        var card=document.createElement('div');
        card.className='booking-card';
        var leftHtml='<div class="booking-card-left">'+
          '<h3>'+escapeHtml(b.specialist||'')+'</h3>'+
          statusBadge(status)+
          '<p><strong>Session:</strong> '+escapeHtml(b.session_type||'')+'</p>'+
          '<p><strong>Date:</strong> '+escapeHtml(b.preferred_date||'')+' · '+escapeHtml(b.time_slot||'')+'</p>'+
          '</div>';
        var rightHtml='<div class="booking-card-right">';
        if(b.video_link&&status!=='cancelled'){
          rightHtml+='<div class="video-link"><a href="'+escapeHtml(b.video_link)+'" target="_blank" rel="noopener">Join video call</a></div>';
        }
        if(status!=='cancelled'&&status!=='confirmed'){
          rightHtml+='<button class="cancel-btn" data-id="'+b.id+'">Cancel</button>';
        }
        rightHtml+='</div>';
        card.innerHTML=leftHtml+rightHtml;
        list.appendChild(card);
      });
      list.querySelectorAll('.cancel-btn').forEach(function(btn){
        btn.addEventListener('click',function(){
          var id=btn.getAttribute('data-id');
          if(!confirm('Cancel this booking?')) return;
          btn.disabled=true; btn.textContent='Cancelling…';
          fetch(API+'/me/bookings/'+id,{method:'DELETE',headers:headers})
            .then(function(r){ return r.json(); })
            .then(function(d){
              if(d&&d.ok){
                btn.closest('.booking-card').querySelector('.booking-status').className='booking-status status-cancelled';
                btn.closest('.booking-card').querySelector('.booking-status').textContent='Cancelled';
                btn.style.display='none';
              } else {
                btn.disabled=false; btn.textContent='Cancel';
                alert(d&&d.error?d.error:'Could not cancel booking.');
              }
            })
            .catch(function(){ btn.disabled=false; btn.textContent='Cancel'; });
        });
      });
    })
    .catch(function(){
      document.getElementById('dashboardError').textContent='Network error. Try again.';
      document.getElementById('dashboardError').style.display='block';
    });
})();
</script>
<script src="premium.js"></script>
<script src="scripts/dark-mode.js"></script>
<script src="scripts/whatsapp-float.js"></script>
</body>
</html>
