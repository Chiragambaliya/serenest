<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon-512.png">
  <link rel="apple-touch-icon" href="/favicon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1E6FAB">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Serenest">
<title>My bookings — Serenest</title>
  <meta name="description" content="View and manage your Serenest bookings, session history, and account details in one place.">
  <link rel="canonical" href="https://serenest.in/dashboard.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Serenest">
  <meta property="og:image" content="https://serenest.in/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@serenest_in">
  <meta name="twitter:image" content="https://serenest.in/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="premium.css">
<script src="config.js"></script>
<style>
:root{--sage:#1E6FAB;--sage-light:#5296C9;--sage-dark:#0F4C7F;--teal:#0891B2;--cream:#F5F8FF;--cream-dark:#E2EBF5;--dark:#0A1628;--dark-mid:#0F2040;--text:#1A2B45;--text-light:#4A637F;--text-muted:#7A92AA;--white:#FFFFFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--text);overflow-x:hidden;min-height:100vh;}
/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 56px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,22,40,0.92);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-bottom:1px solid rgba(30,111,171,0.18);}
.logo{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;color:var(--white);text-decoration:none;letter-spacing:-0.02em;}
.logo span{color:var(--sage-light);}
.nav-links{display:flex;align-items:center;gap:24px;}
.nav-links a{text-decoration:none;font-size:0.85rem;color:rgba(255,255,255,0.6);transition:color 0.2s;font-weight:500;}
.nav-links a:hover{color:var(--white);}
.nav-links a.nav-cta{background:var(--sage);color:var(--white)!important;padding:9px 20px;border-radius:40px;font-weight:600;}
.nav-links a.nav-cta:hover{background:var(--sage-dark);}
/* PAGE HERO */
.dash-hero{padding:120px 56px 48px;background:linear-gradient(135deg,var(--dark) 0%,var(--dark-mid) 60%,#0a2040 100%);position:relative;overflow:hidden;}
.dash-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 40%,rgba(30,111,171,0.12) 0%,transparent 60%),radial-gradient(circle at 10% 80%,rgba(8,145,178,0.06) 0%,transparent 50%);pointer-events:none;}
.dash-hero-inner{position:relative;z-index:1;max-width:900px;margin:0 auto;}
.dash-hero-inner .section-tag{display:inline-block;font-size:0.7rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--sage-light);border:1px solid rgba(82,150,201,0.3);padding:5px 14px;border-radius:40px;margin-bottom:16px;background:rgba(30,111,171,0.1);}
.dash-hero-inner h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,4vw,3rem);font-weight:700;color:var(--white);margin-bottom:10px;letter-spacing:-0.02em;}
.dash-hero-inner p{font-size:0.95rem;color:rgba(255,255,255,0.5);max-width:520px;}
/* CONTENT */
.dash-content{max-width:900px;margin:0 auto;padding:40px 56px 80px;}
.booking-list{display:flex;flex-direction:column;gap:16px;}
.booking-card{background:rgba(255,255,255,0.04);border:1px solid rgba(30,111,171,0.2);border-radius:20px;padding:28px 32px;display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;transition:border-color 0.2s,background 0.2s;}
.booking-card:hover{border-color:rgba(30,111,171,0.4);background:rgba(255,255,255,0.06);}
.booking-card-left h3{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:var(--white);margin-bottom:10px;}
.booking-card-left p{margin:5px 0;font-size:0.875rem;color:rgba(255,255,255,0.5);}
.booking-card-left p strong{color:rgba(255,255,255,0.7);font-weight:600;}
.booking-status{display:inline-block;padding:4px 12px;border-radius:40px;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px;}
.status-confirmed{background:rgba(30,111,171,0.2);color:#7BB8E0;border:1px solid rgba(30,111,171,0.3);}
.status-pending{background:rgba(240,180,60,0.15);color:#f0c95a;border:1px solid rgba(240,180,60,0.25);}
.status-cancelled{background:rgba(192,57,43,0.12);color:#e07070;border:1px solid rgba(192,57,43,0.2);}
.status-rescheduled{background:rgba(52,152,219,0.15);color:#7ac8e8;border:1px solid rgba(52,152,219,0.25);}
.booking-card-right{display:flex;flex-direction:column;gap:10px;flex-shrink:0;align-items:flex-end;}
.booking-card-right .video-link a{display:inline-block;padding:11px 22px;background:linear-gradient(135deg,var(--sage),var(--teal));color:white!important;border-radius:40px;font-size:0.85rem;font-weight:600;text-decoration:none;transition:opacity 0.2s,transform 0.2s;}
.booking-card-right .video-link a:hover{opacity:0.9;transform:translateY(-1px);}
.cancel-btn{font-size:0.8rem;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:40px;padding:8px 16px;color:rgba(255,255,255,0.4);cursor:pointer;font-family:inherit;transition:border-color .2s,color .2s;}
.cancel-btn:hover{border-color:rgba(192,57,43,0.5);color:#e07070;}
.empty-bookings{background:rgba(255,255,255,0.03);border:1px dashed rgba(30,111,171,0.25);border-radius:20px;padding:56px 32px;text-align:center;color:rgba(255,255,255,0.4);}
.empty-bookings p{font-size:0.95rem;line-height:1.7;}
.empty-bookings a{color:var(--sage-light);text-decoration:none;font-weight:600;}
.empty-bookings a:hover{text-decoration:underline;}
.dash-err{color:#e07070;font-size:0.9rem;margin-top:16px;display:none;}
@media(max-width:768px){nav{padding:16px 24px;}.dash-hero{padding:100px 24px 36px;}.dash-content{padding:28px 24px 60px;}.booking-card{padding:20px;flex-direction:column;}.booking-card-right{align-items:flex-start;}.nav-links a.nav-logout{display:none;}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Sere<span>nest</span></a>
  <div class="nav-links">
    <a href="book.html">Book</a>
    <a href="profile.html">Profile</a>
    <a href="account.html">Account</a>
    <a href="#" id="logoutLink" class="nav-logout">Log out</a>
  </div>
</nav>
<div class="dash-hero">
  <div class="dash-hero-inner">
    <span class="section-tag">Patient Portal</span>
    <h1>My Bookings</h1>
    <p>Your upcoming and past sessions. Click "Join video call" when your specialist has shared a link.</p>
  </div>
</div>
<div class="dash-content">
  <div id="bookingList" class="booking-list"></div>
  <div id="emptyBookings" class="empty-bookings" style="display:none;">
    <p>You don't have any bookings yet.</p>
    <p style="margin-top:12px;"><a href="book.html">Book a consultation →</a></p>
  </div>
  <p id="dashboardError" class="dash-err"></p>
</div>
<script>
(function(){
  var TOKEN_KEY='serenest_patient_token';
  var API=(window.API_BASE||'')+'/api';
  var hash=window.location.hash;
  if(hash&&hash.indexOf('token=')!==-1){var t=hash.replace('#token=','').replace('#','');if(t){localStorage.setItem(TOKEN_KEY,t);window.history.replaceState(null,'',window.location.pathname);}}
  var token=localStorage.getItem(TOKEN_KEY);
  if(!token){window.location.href='login.html';return;}
  var headers={'X-Patient-Token':token,'Content-Type':'application/json'};
  document.getElementById('logoutLink').addEventListener('click',function(e){e.preventDefault();fetch(API+'/logout',{method:'POST',headers:headers}).catch(function(){});localStorage.removeItem(TOKEN_KEY);window.location.href='index.html';});
  function escapeHtml(s){if(s==null)return '';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
  function statusBadge(status){var map={confirmed:'status-confirmed',pending:'status-pending',cancelled:'status-cancelled',rescheduled:'status-rescheduled'};var label=(status||'pending').charAt(0).toUpperCase()+(status||'pending').slice(1);return '<span class="booking-status '+(map[status]||'status-pending')+'">'+label+'</span>';}
  fetch(API+'/me/bookings',{headers:headers})
    .then(function(r){if(r.status===401){localStorage.removeItem(TOKEN_KEY);window.location.href='login.html';return null;}return r.json();})
    .then(function(d){
      if(!d)return;
      if(!d.ok){var e=document.getElementById('dashboardError');e.textContent=d.error||'Failed to load';e.style.display='block';return;}
      var list=document.getElementById('bookingList');
      var empty=document.getElementById('emptyBookings');
      var rows=d.data||[];
      if(rows.length===0){empty.style.display='block';return;}
      rows.forEach(function(b){
        var status=b.status||'pending';
        var card=document.createElement('div');
        card.className='booking-card';
        var leftHtml='<div class="booking-card-left"><h3>'+escapeHtml(b.specialist||'')+'</h3>'+statusBadge(status)+'<p><strong>Session:</strong> '+escapeHtml(b.session_type||'')+'</p><p><strong>Date:</strong> '+escapeHtml(b.preferred_date||'')+' · '+escapeHtml(b.time_slot||'')+'</p></div>';
        var rightHtml='<div class="booking-card-right">';
        if(b.video_link&&status!=='cancelled'){rightHtml+='<div class="video-link"><a href="'+escapeHtml(b.video_link)+'" target="_blank" rel="noopener">Join video call</a></div>';}
        if(status!=='cancelled'&&status!=='confirmed'){rightHtml+='<button class="cancel-btn" data-id="'+b.id+'">Cancel</button>';}
        rightHtml+='</div>';
        card.innerHTML=leftHtml+rightHtml;
        list.appendChild(card);
      });
      list.querySelectorAll('.cancel-btn').forEach(function(btn){
        btn.addEventListener('click',function(){
          var id=btn.getAttribute('data-id');
          if(!confirm('Cancel this booking?'))return;
          btn.disabled=true;btn.textContent='Cancelling…';
          fetch(API+'/me/bookings/'+id,{method:'DELETE',headers:headers})
            .then(function(r){return r.json();})
            .then(function(d){
              if(d&&d.ok){btn.closest('.booking-card').querySelector('.booking-status').className='booking-status status-cancelled';btn.closest('.booking-card').querySelector('.booking-status').textContent='Cancelled';btn.style.display='none';}
              else{btn.disabled=false;btn.textContent='Cancel';alert(d&&d.error?d.error:'Could not cancel booking.');}
            })
            .catch(function(){btn.disabled=false;btn.textContent='Cancel';});
        });
      });
    })
    .catch(function(){var e=document.getElementById('dashboardError');e.textContent='Network error. Try again.';e.style.display='block';});
})();
</script>
<script src="premium.js"></script>
<script src="scripts/dark-mode.js"></script>
<script src="scripts/whatsapp-float.js"></script>
</body>
</html>
