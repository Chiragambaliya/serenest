# Serenest Education — https://serenest.academy

services:
  - type: web
    name: serenest-education
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    domains:
      - serenest.academy
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
