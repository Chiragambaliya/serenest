<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon-512.png">
  <link rel="apple-touch-icon" href="/favicon-512.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1E6FAB">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Serenest">
<title>Sign up — Serenest</title>
  <meta name="description" content="Join Serenest and book confidential video consultations with verified psychiatrists and therapists across India.">
  <link rel="canonical" href="https://serenest.in/signup.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Serenest">
  <meta property="og:image" content="https://serenest.in/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@serenest_in">
  <meta name="twitter:image" content="https://serenest.in/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="premium.css">
<script src="config.js"></script>
<style>
:root{--sage:#1E6FAB;--sage-light:#5296C9;--sage-dark:#0F4C7F;--teal:#0891B2;--cream:#F5F8FF;--cream-dark:#E2EBF5;--dark:#0A1628;--dark-mid:#0F2040;--text:#1A2B45;--text-light:#4A637F;--text-muted:#7A92AA;--white:#FFFFFF;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--dark);min-height:100vh;display:flex;flex-direction:column;}
nav{padding:20px 56px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,22,40,0.92);border-bottom:1px solid rgba(30,111,171,0.18);position:fixed;top:0;left:0;right:0;z-index:100;-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);}
.logo{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;color:var(--white);text-decoration:none;letter-spacing:-0.02em;}
.logo span{color:var(--sage-light);}
nav .nav-right a{text-decoration:none;font-size:0.85rem;color:rgba(255,255,255,0.55);transition:color 0.2s;font-weight:500;}
nav .nav-right a:hover{color:var(--white);}
nav .nav-right a+a{margin-left:20px;}
.auth-page{flex:1;display:flex;align-items:center;justify-content:center;padding:100px 24px 60px;background:radial-gradient(circle at 30% 20%,rgba(30,111,171,0.1) 0%,transparent 55%),radial-gradient(circle at 80% 80%,rgba(8,145,178,0.07) 0%,transparent 45%),var(--dark);}
.auth-card{background:rgba(255,255,255,0.04);border:1px solid rgba(30,111,171,0.2);border-radius:24px;padding:48px;max-width:420px;width:100%;-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);}
.auth-card h1{font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:700;color:var(--white);margin-bottom:8px;letter-spacing:-0.02em;}
.auth-card>.sub{margin-bottom:28px;font-size:0.9rem;color:rgba(255,255,255,0.4);}
.auth-card label{display:block;font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.4);margin-bottom:8px;}
.auth-card input{width:100%;padding:14px 16px;border:1px solid rgba(30,111,171,0.25);border-radius:12px;font-family:inherit;font-size:0.95rem;background:rgba(255,255,255,0.06);color:var(--white);margin-bottom:20px;transition:border-color 0.2s;}
.auth-card input::placeholder{color:rgba(255,255,255,0.2);}
.auth-card input:focus{outline:none;border-color:rgba(30,111,171,0.6);background:rgba(255,255,255,0.08);}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,var(--sage),var(--teal));color:var(--white);border:none;border-radius:12px;font-family:inherit;font-size:0.95rem;font-weight:600;cursor:pointer;transition:opacity 0.2s,transform 0.15s;}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px);}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.auth-error{font-size:0.85rem;color:#f08080;margin-top:12px;display:none;background:rgba(192,57,43,0.12);padding:10px 14px;border-radius:10px;}
.auth-card a{font-size:0.88rem;color:var(--sage-light);margin-top:16px;display:inline-block;text-decoration:none;font-weight:600;}
.auth-card a:hover{text-decoration:underline;}
.trust-badges{display:flex;gap:16px;margin-bottom:28px;flex-wrap:wrap;}
.trust-badge{display:flex;align-items:center;gap:6px;font-size:0.75rem;color:rgba(255,255,255,0.35);font-weight:500;}
.trust-badge span{font-size:0.9rem;}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Sere<span>nest</span></a>
  <div class="nav-right">
    <a href="login.html">Log in</a>
    <a href="book.html">Book</a>
  </div>
</nav>
<div class="auth-page">
  <div class="auth-card">
    <h1>Create account</h1>
    <p class="sub">Sign up to see your bookings and session links in one place.</p>
    <div class="trust-badges">
      <div class="trust-badge"><span>🔒</span> Secure & private</div>
      <div class="trust-badge"><span>✓</span> Free to join</div>
      <div class="trust-badge"><span>⚕</span> Verified specialists</div>
    </div>
    <form id="signupForm">
      <label>Full name (optional)</label>
      <input type="text" name="full_name" placeholder="Your name">
      <label>Email</label>
      <input type="email" name="email" required placeholder="your@email.com">
      <label>Password (min 8 characters)</label>
      <input type="password" name="password" required minlength="8" placeholder="Min 8 characters">
      <button type="submit" class="btn-primary">Create account</button>
    </form>
    <p id="authError" class="auth-error"></p>
    <a href="login.html">Already have an account? Log in</a>
  </div>
</div>
<script>
(function(){
  var API=(window.API_BASE||'')+'/api';
  var form=document.getElementById('signupForm');
  var err=document.getElementById('authError');
  form.addEventListener('submit',function(e){
    e.preventDefault();
    err.style.display='none';
    var full_name=form.full_name.value.trim();
    var email=form.email.value.trim();
    var password=form.password.value;
    if(password.length<8){err.textContent='Password must be at least 8 characters.';err.style.display='block';return;}
    var btn=form.querySelector('button[type=submit]');
    btn.disabled=true;btn.textContent='Creating account…';
    fetch(API+'/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,password:password,full_name:full_name})})
      .then(function(r){return r.json();})
      .then(function(d){if(d&&d.ok){window.location.href='login.html?signedup=1';}else{err.textContent=d&&d.error?d.error:'Sign up failed.';err.style.display='block';btn.disabled=false;btn.textContent='Create account';}})
      .catch(function(){err.textContent='Network error. Try again.';err.style.display='block';btn.disabled=false;btn.textContent='Create account';});
  });
})();
</script>
<script src="premium.js"></script>
<script src="scripts/dark-mode.js"></script>
<script src="scripts/whatsapp-float.js"></script>
</body>
</html>
